<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0F172A"/>
  
  <!-- Rising bar chart -->
  <rect x="4" y="20" width="5" height="8" rx="1.5" fill="#2DD4BF" opacity="0.5"/>
  <rect x="11" y="14" width="5" height="14" rx="1.5" fill="#2DD4BF" opacity="0.75"/>
  <rect x="18" y="8" width="5" height="20" rx="1.5" fill="#2DD4BF"/>
  
  <!-- Upward trend line -->
  <polyline
    points="6.5,19 13.5,13 20.5,7"
    fill="none"
    stroke="#5EEAD4"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Dot at the top of trend line -->
  <circle cx="20.5" cy="7" r="2" fill="#5EEAD4"/>

  <!-- Small F letter hint bottom right -->
  <text x="24" y="30" font-family="Arial" font-weight="800" font-size="7" fill="#2DD4BF" opacity="0.9">F</text>
</svg>
